<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🚗 Car Price Predictor</h1>
        <form action="/predict" method="POST">
            <label for="present_price">Present Price (in Lakhs)</label>
            <input type="number" step="any" id="present_price" name="present_price" placeholder="e.g. 6.5" required>

            <label for="kms_driven">Kilometers Driven</label>
            <input type="number" id="kms_driven" name="kms_driven" placeholder="e.g. 45000" required>

            <label for="fuel_type">Fuel Type</label>
            <select id="fuel_type" name="fuel_type">
                <option value="0">Petrol</option>
                <option value="1">Diesel</option>
                <option value="2">CNG</option>
            </select>

            <label for="seller_type">Seller Type</label>
            <select id="seller_type" name="seller_type">
                <option value="0">Dealer</option>
                <option value="1">Individual</option>
            </select>

            <label for="transmission">Transmission</label>
            <select id="transmission" name="transmission">
                <option value="0">Manual</option>
                <option value="1">Automatic</option>
            </select>

            <label for="owner">Number of Previous Owners</label>
            <input type="number" id="owner" name="owner" placeholder="e.g. 0" required>

            <label for="car_age">Car Age (in years)</label>
            <input type="number" id="car_age" name="car_age" placeholder="e.g. 5" required>

            <button type="submit" class="btn">Predict Price</button>
        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}

        <div class="footer">
            <a href="https://github.com/iamgkkj/car-price-prediction-model" target="_blank">

    </div>
</body>
</html>
